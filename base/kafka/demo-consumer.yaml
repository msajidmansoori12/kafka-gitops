apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-demo-consumer
  namespace: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app: kafka-demo-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-demo-consumer
  template:
    metadata:
      labels:
        app: kafka-demo-consumer
    spec:
      containers:
        - name: consumer
          image: quay.io/strimzi/kafka:0.38.0-kafka-3.6.0
          command:
            - /opt/kafka/bin/kafka-console-consumer.sh
          args:
            - --bootstrap-server
            - $(KAFKA_BOOTSTRAP_SERVERS)
            - --topic
            - $(KAFKA_TOPIC)
            - --from-beginning
          envFrom:
            - configMapRef:
                name: kafka-demo-app-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
